{% extends 'paginas/index.html' %}

{% block conteudo %}

<div class="max-w-md w-full mx-4 bg-white p-8 rounded-xl shadow-lg text-center border border-gray-100">
        
        <!-- Ícone de Cadeado/Alerta -->
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-amber-100 text-amber-600 mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </div>

        <!-- Título principal -->
        <h1 class="text-2xl font-bold text-gray-800 mb-3">
            Acesso Restrito
        </h1>

        <!-- Mensagem explicativa -->
        <p class="text-gray-600 mb-8 leading-relaxed">
            Você precisa estar conectado em uma conta para acessar esta página e gerenciar seus camelos.
        </p>

        <!-- Botões de Ação -->
        <div class="space-y-3">
            <!-- Botão de Login (Destaque) -->
            <!-- Lembre-se de substituir 'login' pelo nome da sua rota de login no Django -->
            <a href="{% url 'login' %}" class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200 shadow-md hover:shadow-lg">
                Fazer Login
            </a>

            <!-- Link opcional para Criar Conta -->
            <!-- Se tiver uma rota de cadastro, mude o '#' para {% url 'seu_cadastro' %} -->
            <p class="text-sm text-gray-500 pt-2">
                Não tem uma conta? 
                <a href="#" class="text-blue-600 hover:underline font-medium">Cadastre-se</a>
            </p>
        </div>

        <!-- Botão sutil para voltar à Home se o usuário estiver perdido -->
        <div class="mt-8 border-t border-gray-100 pt-4">
            <a href="/" class="text-xs text-gray-400 hover:text-gray-600 transition duration-150">
                &larr; Voltar para a página inicial
            </a>
        </div>

    </div>

{% endblock %}
