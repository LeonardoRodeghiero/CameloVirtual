{% extends 'paginas/index.html' %}

{% block conteudo %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <h3 class="mb-4 text-center fw-bold">Como você prefere receber o seu pedido?</h3>

            <!-- Formulário que envia os dados finais para o Banco de Dados -->
            <form action="{% url 'realizar-pedido-direto' produto.id %}" method="post" class="p-4 border rounded bg-light shadow-sm">
                {% csrf_token %}
                
                <!-- Mantém a quantidade salva em background, sem exibir pro usuário -->
                <input type="hidden" name="quantidade" value="{{ quantidade }}">

                <div class="mb-4">
                    <!-- Opção 1: Receber em Casa -->
                    <div class="form-check p-3 border rounded mb-3 bg-white d-flex align-items-center">
                        <input class="form-check-input ms-1" type="radio" name="entrega" id="entregaCasa" value="casa" checked>
                        <label class="form-check-label ms-3" for="entregaCasa">
                            <span class="d-block fw-bold"><i class="bi bi-truck me-2"></i>Receber em casa</span>
                            <small class="text-muted">Enviaremos para o seu endereço cadastrado.</small>
                        </label>
                    </div>
                    
                    <!-- Opção 2: Retirar na Loja -->
                    <div class="form-check p-3 border rounded bg-white d-flex align-items-center">
                        <input class="form-check-input ms-1" type="radio" name="entrega" id="entregaLoja" value="loja">
                        <label class="form-check-label ms-3" for="entregaLoja">
                            <span class="d-block fw-bold"><i class="bi bi-shop me-2"></i>Retirar na loja - {{ produto.camelo.logradouro }}, {{ produto.camelo.numero }} {% if produto.camelo.complemento %}
                            {{ produto.camelo.complemento }}
                            {% endif %} 
                            {{ produto.camelo.bairro }} {{ produto.camelo.cep }} {{ produto.camelo.cidade }} ({{ produto.camelo.estado }})</span>
                            <small class="text-muted"> Pegue diretamente no balcão da loja física.</small>
                        </label>
                    </div>
                </div>

                <!-- Botão de ação principal -->
                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">
                    Confirmar Opção e Finalizar
                </button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
